apiVersion: apps/v1
kind: Deployment
metadata:
  name: addresses-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: addresses-service
  template:
    metadata:
      labels:
        app: addresses-service
    spec:
      containers:
        - name: addresses-container
          image: addresses-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4004"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: database-url
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: allowed-origins
          ports:
            - containerPort: 4004
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4004
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: addresses-service
spec:
  selector:
    app: addresses-service
  type: NodePort
  ports:
    - port: 4004
      targetPort: 4004
      nodePort: 30404
