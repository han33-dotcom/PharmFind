apiVersion: apps/v1
kind: Deployment
metadata:
  name: prescriptions-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prescriptions-service
  template:
    metadata:
      labels:
        app: prescriptions-service
    spec:
      containers:
        - name: prescriptions-container
          image: prescriptions-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4006"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: database-url
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: allowed-origins
          ports:
            - containerPort: 4006
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4006
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4006
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: prescriptions-service
spec:
  selector:
    app: prescriptions-service
  type: NodePort
  ports:
    - port: 4006
      targetPort: 4006
      nodePort: 30406
