apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
        - name: orders-container
          image: orders-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4003"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: database-url
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: pharmfind-secrets
                  key: allowed-origins
          ports:
            - containerPort: 4003
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4003
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: orders-service
spec:
  selector:
    app: orders-service
  type: NodePort
  ports:
    - port: 4003
      targetPort: 4003
      nodePort: 30403
