name: CI

on:
  push:
    branches:
      - main
      - master
      - "hassan/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: npm ci --prefix server

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run Backend Integration Tests
        run: npm test
