      dockerfile: Dockerfile.orders
      args:
        NODE_VERSION: 20-alpine
    container_name: pharmfind-orders
    environment:
      NODE_ENV: production
      PORT: 4003
      DATABASE_URL: postgres://pharm:pharm@postgres:5432/pharmdb
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in your environment or .env file}"
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
