  prescriptions:
    build:
      context: ./server
      dockerfile: Dockerfile.prescriptions
      args:
        NODE_VERSION: 20-alpine
    container_name: pharmfind-prescriptions
    environment:
      NODE_ENV: production
      PORT: 4006
