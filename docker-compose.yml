services:
  postgres:
    image: postgres:15-alpine
    container_name: pharmfind-postgres
    environment:
      POSTGRES_USER: pharm
      POSTGRES_PASSWORD: pharm
      POSTGRES_DB: pharmdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharm"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ./server
      dockerfile: Dockerfile.auth
      args:
        NODE_VERSION: 20-alpine
    container_name: pharmfind-auth
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://pharm:pharm@postgres:5432/pharmdb
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in your environment or .env file}"
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173
      EMAIL_MODE: console
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  medicines:
    build:
      context: ./server
      dockerfile: Dockerfile.medicines
      args:
        NODE_VERSION: 20-alpine
    container_name: pharmfind-medicines
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgres://pharm:pharm@postgres:5432/pharmdb
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in your environment or .env file}"
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  pharmacies:
