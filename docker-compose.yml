    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4002/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  orders:
